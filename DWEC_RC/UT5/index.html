<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Formulario - UT5</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        #errores { color: red; font-weight: bold; margin-bottom: 15px; line-height: 1.5; }
        #intentos { color: blue; font-weight: bold; margin-bottom: 15px; }
        input[type="text"], select { width: 200px; padding: 5px; }
        button { padding: 8px 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Formulario de Registro</h2>
    
    <!-- Contenedores solicitados en el enunciado -->
    <div id="intentos"></div>
    <div id="errores"></div>

    <form id="formulario" action="#" method="post">
        <div class="form-group">
            <label for="nombre">NOMBRE:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <div class="form-group">
            <label for="apellidos">APELLIDOS:</label>
            <input type="text" id="apellidos" name="apellidos">
        </div>
        <div class="form-group">
            <label for="edad">EDAD:</label>
            <input type="text" id="edad" name="edad">
        </div>
        <div class="form-group">
            <label for="nif">NIF:</label>
            <input type="text" id="nif" name="nif" placeholder="12345678-A">
        </div>
        <div class="form-group">
            <label for="email">E-MAIL:</label>
            <input type="text" id="email" name="email">
        </div>
        <div class="form-group">
            <label for="provincia">PROVINCIA:</label>
            <select id="provincia" name="provincia">
                <option value="0">Seleccione provincia...</option>
                <option value="A Coruña">A Coruña</option>
                <option value="Lugo">Lugo</option>
                <option value="Ourense">Ourense</option>
                <option value="Pontevedra">Pontevedra</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fecha">FECHA:</label>
            <input type="text" id="fecha" name="fecha" placeholder="dd/mm/aaaa">
        </div>
        <div class="form-group">
            <label for="telefono">TELÉFONO:</label>
            <input type="text" id="telefono" name="telefono">
        </div>
        <div class="form-group">
            <label for="hora">HORA:</label>
            <input type="text" id="hora" name="hora" placeholder="hh:mm">
        </div>
        
        <button type="submit" id="enviar">Enviar</button>
    </form>

    <!-- Única modificación permitida: referencia al script -->
    <script src="validaciones.js"></script>
</body>
</html>
