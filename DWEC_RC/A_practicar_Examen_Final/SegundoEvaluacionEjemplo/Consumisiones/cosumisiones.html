<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumiciones</title>
    <link rel="stylesheet" href="cosumisiones.css">
</head>
<body>
    <h1>Gestión de Consumiciones</h1>

    <!-- Formulario de entrada -->
    <section id="entrada">
        <div class="campo-entrada">
            <label for="bebida">Nombre de la bebida</label>
            <input type="text" id="bebida" placeholder="Ej: Agua">
        </div>
        <div class="campo-entrada">
            <label for="precio">Precio (0-9)</label>
            <input type="text" id="precio" placeholder="Ej: 2">
        </div>
        <button id="btn-introducir">Introducir producto</button>
    </section>

    <!-- Tabla de productos -->
    <section id="seccion-tabla">
        <h2>Productos disponibles</h2>
        <table id="tabla-productos">
            <thead>
                <tr>
                    <th>Bebida</th>
                    <th>Precio (€)</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                <!-- filas generadas por JS -->
            </tbody>
        </table>
    </section>

    <!-- Cuenta -->
    <section id="seccion-cuenta">
        <h2>Cuenta</h2>
        <ul id="lista-cuenta">
            <!-- consumiciones generadas por JS -->
        </ul>
        <p id="total">Total: <span id="valor-total">0</span> €</p>
        <button id="btn-nueva-cuenta">Cuenta nueva</button>
    </section>

    <script src="cosumisiones.js"></script>
</body>
</html>
