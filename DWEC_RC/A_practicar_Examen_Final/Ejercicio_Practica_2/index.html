<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Libros</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Gestión de Libros</h1>

  <!-- ===== FILA PRINCIPAL: formulario + tabla ===== -->
  <div class="main-row">

    <!-- FORMULARIO -->
    <section class="form-section">
      <h2>Añadir libro</h2>
      <form id="formLibro" novalidate>

        <div class="field">
          <label for="isbn">ISBN (8 dígitos)</label>
          <input type="text" id="isbn" maxlength="8" placeholder="12345678" />
          <span class="error" id="errorIsbn"></span>
        </div>

        <div class="field">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" placeholder="Título del libro" />
          <span class="error" id="errorTitulo"></span>
        </div>

        <div class="field">
          <label for="autor">Autor</label>
          <input type="text" id="autor" placeholder="Nombre del autor" />
          <span class="error" id="errorAutor"></span>
        </div>

        <div class="field">
          <label for="editorial">Editorial</label>
          <input type="text" id="editorial" placeholder="Editorial" />
          <span class="error" id="errorEditorial"></span>
        </div>

        <div class="field">
          <label for="precio">Precio (€)</label>
          <input type="number" id="precio" min="0.01" step="0.01" placeholder="0.00" />
          <span class="error" id="errorPrecio"></span>
        </div>

        <button type="submit" id="btnAnadir">Añadir libro</button>
      </form>
    </section>

    <!-- TABLA -->
    <section class="table-section">
      <h2>Tabla de libros</h2>
      <div class="table-wrapper">
        <table id="tablaLibros">
          <thead>
            <tr>
              <th>ISBN</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Editorial</th>
              <th>Precio</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla">
            <!-- Las filas se insertan dinámicamente -->
          </tbody>
        </table>
      </div>
      <p id="mensajeVacio" class="mensaje-vacio">La tabla está vacía. Añade libros usando el formulario.</p>
    </section>

  </div><!-- /.main-row -->

  <!-- ===== EJERCICIO 2: EXPORTAR A ARRAY ===== -->
  <section class="array-section">
    <h2>Exportar a array de objetos</h2>
    <div class="array-section-inner">
      <button id="btnExportar">Guardar tabla en array</button>
      <pre id="salidaArray" class="salida-array">// Pulsa el botón para exportar los libros de la tabla.</pre>
    </div>
  </section>

  <script src="libros.js"></script>
</body>
</html>
