<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sopa de Letras</title>
  <link rel="stylesheet" href="ejercicio2_sopa.css" />
</head>
<body>

  <h1>Sopa de Letras</h1>

  <!-- Panel de configuración -->
  <section class="panel-config">
    <label for="tamano">Tamaño de la tabla (NXN):</label>
    <input type="number" id="tamano" min="3" max="20" value="8" />
    <button id="btnIniciar">Iniciar juego</button>
  </section>

  <!-- Zona de juego (oculta hasta iniciar) -->
  <section class="panel-juego" id="panelJuego" hidden>

    <div class="busqueda-row">
      <input type="text" id="palabraBuscar" placeholder="Escribe una palabra..." />
      <button id="btnBuscar">Buscar</button>
    </div>

    <p id="resultado" class="resultado"></p>

    <div id="contenedorTabla" class="contenedor-tabla"></div>

  </section>

  <script src="ejercicio2_sopa.js"></script>
</body>
</html>
