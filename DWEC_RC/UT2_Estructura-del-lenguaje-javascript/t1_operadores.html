    <h1>Operador $ dolar</h1>
    <h1>Este operador condicional es la forma reducida de la expresión if - else.

La sintaxis formal para este operador condicional es:

(condicion) ? expresionV : expresionF;

Si la condición evalúa a true devuelve expresionV y en caso contrario devuelve expresionF.</h1>
